id: regulated_rag_assistant
schema_version: "0.2"
default: deny

rules:
  - name: deny_secrets
    effect: deny
    when:
      data.contains_secrets: true

  - name: allow_clinician_rag
    effect: allow
    when:
      user.role_in:
        - clinician
        - compliance_officer
      request.region: us
      request.task_type: rag_answer
      risk.tier_in:
        - low
        - medium

  - name: redact_phi_for_non_compliance
    effect: transform
    action: redact
    when:
      data.contains_phi: true
      user.role_not_in:
        - compliance_officer

