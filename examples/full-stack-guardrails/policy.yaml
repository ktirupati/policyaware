id: full_stack_guardrails_policy
schema_version: "0.2"
default: deny

guards:
  input:
    - name: demo_guard
      when:
        request.task_type: support

  output:
    - name: demo_guard
      when:
        request.task_type: support

rules:
  - name: deny_secrets
    effect: deny
    when:
      data.contains_secrets: true

  - name: redact_pii
    effect: transform
    action: redact
    when:
      data.contains_pii: true

  - name: allow_low_risk_support
    effect: allow
    when:
      user.role_in: [support_agent, developer, platform_engineer]
      request.risk_in: [low, medium]
