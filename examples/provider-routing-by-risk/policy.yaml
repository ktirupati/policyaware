id: provider_routing_by_risk
schema_version: "0.2"
default: deny

rules:
  - name: deny_secrets
    effect: deny
    when:
      data.contains_secrets: true

  - name: allow_platform_users
    effect: allow
    when:
      user.role_in:
        - developer
        - clinician
      request.region: us
      risk.tier_in:
        - low
        - medium
        - high

  - name: redact_sensitive_data
    effect: transform
    action: redact
    when:
      data.contains_sensitive: true
