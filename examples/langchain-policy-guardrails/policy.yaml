id: langchain_policy_guardrails
schema_version: "0.2"
default: deny

rules:
  - name: deny_secrets
    effect: deny
    when:
      data.contains_secrets: true

  - name: allow_developer_chain_prompts
    effect: allow
    when:
      user.role_in:
        - developer
        - analyst
      request.region: us
      risk.tier_in:
        - low
        - medium

  - name: redact_pii
    effect: transform
    action: redact
    when:
      data.contains_pii: true

