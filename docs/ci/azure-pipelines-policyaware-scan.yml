trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: "3.12"

  - script: python -m pip install policyaware
    displayName: Install PolicyAware

  - script: |
      policyaware scan . \
        --out policyaware-scan-report.html \
        --config examples/policyaware-scan.yaml \
        --format html,json,sarif,markdown \
        --fail-on high
    displayName: Run PolicyAware scan

  - publish: policyaware-scan-report.html
    artifact: policyaware-scan-report
    condition: always()

  - publish: policyaware-scan-report.json
    artifact: policyaware-scan-json
    condition: always()

  - publish: policyaware-scan-report.md
    artifact: policyaware-scan-markdown
    condition: always()

  - publish: policyaware-scan-report.sarif
    artifact: policyaware-scan-sarif
    condition: always()
